name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reset Pages configuration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          REPO="${{ github.repository }}"

          # Check current Pages status
          echo "=== GET Pages status ==="
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pages" | tee /tmp/pages_status.json

          # Delete Pages to reset state
          echo "=== DELETE Pages ==="
          curl -s -w "DELETE_STATUS:%{http_code}" -X DELETE \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pages" | tee /tmp/pages_delete.json

          sleep 5

          # Re-create with Actions-based deployment
          echo "=== POST Create Pages (workflow build type) ==="
          curl -s -w "\nPOST_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d '{"build_type":"workflow"}' \
            "https://api.github.com/repos/$REPO/pages" | tee /tmp/pages_create.json

          sleep 3

          # Verify
          echo "=== GET Pages status after re-create ==="
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pages" | tee /tmp/pages_verify.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
