name: Deploy to Netlify

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Create site and deploy
        env:
          NETLIFY_AUTH_TOKEN: nfp_dc2K4kBg4MBBBz3DLgSVNwD8QZfEcUy2d9e2
        run: |
          SITE_JSON=$(curl -s -X POST \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.netlify.com/api/v1/sites")

          echo "API response: $SITE_JSON"
          SITE_ID=$(echo "$SITE_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
          SITE_URL=$(echo "$SITE_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssl_url') or d.get('url',''))" 2>/dev/null)

          if [ -n "$SITE_ID" ]; then
            netlify deploy --dir . --prod \
              --site "$SITE_ID" \
              --auth "$NETLIFY_AUTH_TOKEN" 2>&1
            echo "NETLIFY_URL=$SITE_URL" >> "$GITHUB_OUTPUT"
            echo "$SITE_URL" > /tmp/netlify_url.txt
          else
            echo "Site creation failed, trying direct deploy..."
            OUTPUT=$(netlify deploy --dir . --prod --auth "$NETLIFY_AUTH_TOKEN" 2>&1)
            echo "$OUTPUT"
            URL=$(echo "$OUTPUT" | grep -oE 'https://[a-z0-9-]+\.netlify\.app' | head -1)
            echo "$URL" > /tmp/netlify_url.txt
          fi

          cat /tmp/netlify_url.txt

      - name: Write URL to repo
        env:
          NETLIFY_AUTH_TOKEN: nfp_dc2K4kBg4MBBBz3DLgSVNwD8QZfEcUy2d9e2
        run: |
          URL=$(cat /tmp/netlify_url.txt 2>/dev/null || echo "")
          # Also try listing sites to find the latest
          if [ -z "$URL" ]; then
            SITES=$(curl -s \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              "https://api.netlify.com/api/v1/sites?per_page=1&sort_by=created_at&direction=desc")
            URL=$(echo "$SITES" | python3 -c "import sys,json; sites=json.load(sys.stdin); print(sites[0].get('ssl_url','') if isinstance(sites,list) and sites else '')" 2>/dev/null)
          fi
          echo "Deployed to: $URL"
          echo "$URL" > NETLIFY_URL.txt
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add NETLIFY_URL.txt
          git diff --staged --quiet || git commit -m "Add Netlify URL [skip ci]"
          git push origin main || true
