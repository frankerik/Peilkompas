name: Deploy to Netlify

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Create site and deploy
        env:
          NETLIFY_AUTH_TOKEN: nfp_dc2K4kBg4MBBBz3DLgSVNwD8QZfEcUy2d9e2
        run: |
          SITE_JSON=$(curl -s -X POST \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.netlify.com/api/v1/sites")

          echo "API response: $SITE_JSON"
          SITE_ID=$(echo "$SITE_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null)
          SITE_URL=$(echo "$SITE_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssl_url') or d.get('url',''))" 2>/dev/null)

          if [ -n "$SITE_ID" ]; then
            netlify deploy --dir . --prod \
              --site "$SITE_ID" \
              --auth "$NETLIFY_AUTH_TOKEN" 2>&1
            echo "NETLIFY_URL=$SITE_URL" >> "$GITHUB_OUTPUT"
            echo "$SITE_URL" > /tmp/netlify_url.txt
          else
            echo "Site creation failed, trying direct deploy..."
            OUTPUT=$(netlify deploy --dir . --prod --auth "$NETLIFY_AUTH_TOKEN" 2>&1)
            echo "$OUTPUT"
            URL=$(echo "$OUTPUT" | grep -oE 'https://[a-z0-9-]+\.netlify\.app' | head -1)
            echo "$URL" > /tmp/netlify_url.txt
          fi

          cat /tmp/netlify_url.txt

      - name: Report URL via GitHub Issue
        env:
          NETLIFY_AUTH_TOKEN: nfp_dc2K4kBg4MBBBz3DLgSVNwD8QZfEcUy2d9e2
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL=$(cat /tmp/netlify_url.txt 2>/dev/null | tr -d '[:space:]')
          # Fallback: list most recently created Netlify site
          if [ -z "$URL" ]; then
            SITES=$(curl -s \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              "https://api.netlify.com/api/v1/sites?per_page=5&sort_by=created_at")
            echo "Sites response: $SITES"
            URL=$(echo "$SITES" | python3 -c "
import sys,json
try:
    sites=json.load(sys.stdin)
    if isinstance(sites,list) and sites:
        for s in sites:
            u=s.get('ssl_url') or s.get('url','')
            if u: print(u); break
except: pass
" 2>/dev/null)
          fi
          echo "Final URL: $URL"
          # Post as GitHub issue so it's readable
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d "{\"title\":\"Netlify URL: $URL\",\"body\":\"Deployed Peilkompas to: $URL\",\"labels\":[]}"
